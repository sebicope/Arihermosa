<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para vos ❤️</title>

<style>

body{
    margin:0;
    background:#ffe6ef;
    font-family: Arial, sans-serif;
    min-height:100vh;
}

.container{
    width:92%;
    max-width:430px;
    margin:0 auto;
    padding:24px 0 35px;
}

.titulo{
    text-align:center;
    color:#d63384;
    font-size:32px;
    margin:0 0 24px;
    line-height:1.25;
}

.fotos-arriba{
    display:flex;
    justify-content:space-between;
    gap:14px;
    margin-bottom:18px;
}

.foto-chica{
    width:50%;
}

.foto-principal{
    margin-bottom:18px;
}

.foto-abajo{
    margin-top:0;
}

img{
    width:100%;
    display:block;
    border-radius:18px;
    border:2px solid rgba(255,255,255,0.65);
    box-shadow:0 8px 22px rgba(0,0,0,0.15);
    box-sizing:border-box;
}

</style>
</head>

<body>

<div class="container">

    <h1 class="titulo">
        Te amo mucho ❤️<br>
        Gracias por este primer mes
    </h1>

    <div class="fotos-arriba">
        <div class="foto-chica">
            <img src="foto1.jpg" alt="Foto nuestra 1">
        </div>

        <div class="foto-chica">
            <img src="foto2.jpg" alt="Foto nuestra 2">
        </div>
    </div>

    <div class="foto-principal">
        <img src="foto.jpg" alt="Nosotros">
    </div>


</div>

</body>
</html>
